<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Connect | Aman Vishwakarma</title>

<style>

  /* RESET */
  * {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
  }

  /* BODY STYLE */
  body {
    height: 100vh;
    font-family: serif;
    background: linear-gradient(135deg, #cb670f, #000000);
    display: flex;
    justify-content: center;
    align-items: center;
  }

  /* MAIN CARD */
  .card {
    background: rgba(255, 255, 255, 0.6);
    backdrop-filter: blur(10px);
    padding: 40px;
    border-radius: 20px;
    width: 320px;
    text-align: center;
    box-shadow: 0 10px 30px rgba(0,0,0,0.1);
  }

  /* TITLE */
  .card h1 {
    font-size: 28px;
    margin-bottom: 25px;
    font-weight: normal;
    letter-spacing: 1px;
  }

  /* LINKS */
  .link {
    display: block;
    margin: 15px 0;
    padding: 12px;
    border-radius: 10px;
    text-decoration: none;
    color: #333;
    background: white;
    transition: 0.3s ease;
  }

  .link:hover {
    transform: translateY(-3px);
    box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  }

  /* FOOTER TEXT */
  .small-text {
    margin-top: 20px;
    font-size: 12px;
    color: #777;
  }

</style>
</head>

<body>

  <div class="card">
    <h1 style="color: black;">Connect</h1>

      Twitter (X)
    </a>

      GitHub
    </a>

    <a style="text-decoration: none; color: #333;" href="index.html">Aman Vishwakarma</a>
  </div>

</body>
</html>
